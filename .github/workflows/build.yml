name: Build and Deploy

on:
  push:
    branches: [master]
    paths:
      - 'yuni-*/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  IMAGE: yuier/yuni3
  BACKUP_IMAGE: ghcr.io/liyuier/yuni3

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # -- 构建镜像（不推） --
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          provenance: false
          tags: ${{ env.IMAGE }}:latest

      # -- 推送到 Docker Hub --
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: yuier
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        run: |
          docker tag ${{ env.IMAGE }}:latest ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      # -- 推送到 GHCR（备份） --
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          docker tag ${{ env.IMAGE }}:latest ${{ env.BACKUP_IMAGE }}:latest
          docker tag ${{ env.IMAGE }}:latest ${{ env.BACKUP_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKUP_IMAGE }}:latest
          docker push ${{ env.BACKUP_IMAGE }}:${{ github.sha }}

