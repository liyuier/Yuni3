server:
  port: 11451

spring:
  application:
    name: yuni-application
  datasource:  # 数据库配置
    url: jdbc:sqlite:${bot.app.sqlite-db-file}  # 数据库使用 sqlite, 数据库文件默认在跟目录下。文件名由下方的 sqlite-db-file 属性指定
    driver-class-name: org.sqlite.JDBC  # 数据库驱动
    username:
    password:
    # Redis配置
  data:
    redis:
      # 服务器地址
      host: localhost
      # 端口号
      port: 6379
      # 密码（无密码则注释或留空）
      password:
      # 数据库索引（默认0，Redis支持16个数据库）
      database: 0
      # 连接超时时间
      timeout: 10000ms
      # 连接池配置（基于commons-pool2）
      lettuce:
        pool:
          # 最大活跃连接数
          max-active: 8
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数
          min-idle: 0
          # 最大等待时间（-1表示无限制）
          max-wait: -1ms

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto

logging:
  config: classpath:log4j2.yml  # 日志配置文件，详见其中内容

bot:
  qq: 123456789  # 机器人的 QQ 号
  nickname: xcw  # 机器人的昵称
  master-qq: 987654321  # 你自己的 QQ 号
  app:
    command-flag: /  # 定义命令时的全局前缀
    plugin:
      directory: plugins  # 插件 jar 包的位置，默认位于 application 模块的 plugins 目录下
    sqlite-db-file: data/yuni3.db  # 应用使用的 sqlite 数据库文件名

yuni:  # 用于 banner.txt
  name: Yuni
  version: v3.0.0
  description: 基于 Spring Boot 开发的一款聊天机器人
  protocol:
    type: onebot           # 协议/平台类型；目前仅支持 onebot。OneBot 协议对接 QQ 平台
    onebot:
      mode: ws             # 与 OneBot 前端的通信方式: ws (WebSocket) 或 http（事实上现在只实现了 ws）
      token: xxxxxxxxxxxxx            # Access Token，需要与 OneBot 前端配置一致
      ws:
        url: ws://localhost:3001      # WebSocket 连接地址。假设 OneBot 前端采用的是 NapCat ，这里对应 NapCat 新建 WebSocket 服务器的地址
        heartbeat-interval: 30000     # 心跳间隔，单位毫秒
        timeout: 3000                 # 请求超时，单位毫秒
        reconnect-wait-seconds: 10    # 断联后等待重连的最大秒数
      http:
        url: http://localhost:3000    # HTTP API 地址
      retry:
        max-retries: 2                # 业务层最大重试次数（不含首次调用，0=不重试）
        backoff-base-ms: 500          # 重试退避基数（毫秒），第 n 次重试等待 backoff-base-ms * n