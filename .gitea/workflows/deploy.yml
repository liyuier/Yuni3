name: Build and Deploy
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Maven build
        run: mvn package -pl yuni-application -am -DskipTests -q

      - name: Docker build & deploy
        run: |
          docker build -t yuni3:latest .
          docker stop yuni3 2>/dev/null || true
          docker rm yuni3 2>/dev/null || true
          docker run -d --name yuni3 --restart always \
            -p 11451:11451 -p 11452:11452 -p 11533:3005 \
            -v /srv/docker/yuni/config:/app/config:ro \
            -v /srv/docker/yuni/data:/app/data \
            -v /srv/docker/yuni/logs:/app/logs \
            -v /srv/docker/yuni/plugins:/app/plugins \
            yuni3:latest
