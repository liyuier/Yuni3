name: Build and Deploy
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Maven build
        run: mvn package -pl yuni-application -am -DskipTests -q

      - name: Docker build & push
        run: |
          docker build -t localhost:5000/yuni3:latest .
          docker push localhost:5000/yuni3:latest

      - name: Notify deploy
        run: |
          curl -X POST http://localhost:9000/hooks/deploy-yuni3 \
            -H "Authorization: Bearer yuni-deploy-token" \
            -H "Content-Type: application/json" \
            -d '{}'
